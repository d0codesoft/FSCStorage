<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scp.filestorage.webui</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="scp.filestorage.webui.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <script>
        window.fscTheme = {
            storageKey: "fsc-storage-theme",
            apply(theme) {
                const isDark = theme === "dark";
                document.body.classList.toggle("fsc-dark-theme", isDark);
                document.documentElement.style.colorScheme = isDark ? "dark" : "light";
                localStorage.setItem(this.storageKey, isDark ? "dark" : "light");
                return isDark;
            },
            init() {
                const savedTheme = localStorage.getItem(this.storageKey);
                const prefersDark = window.matchMedia?.("(prefers-color-scheme: dark)").matches;
                return this.apply(savedTheme ?? (prefersDark ? "dark" : "light"));
            },
            toggle() {
                return this.apply(document.body.classList.contains("fsc-dark-theme") ? "light" : "dark");
            }
        };
    </script>
</head>

<body>
    <script>window.fscTheme.init();</script>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <script src="_content/Radzen.Blazor/Radzen.Blazor.min.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
